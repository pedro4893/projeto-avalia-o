<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNA 2026 - Galeria Interativa</title>
    <style>
        :root {
            --accent: #00d4ff;
            --glass: rgba(255, 255, 255, 0.1);
            --bg: #020205;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg) url('https://www.transparenttextures.com/patterns/stardust.png') fixed; color: white; scroll-behavior: smooth; }

        /* --- SEÇÃO 1: MENU --- */
        nav {
            position: fixed; top: 0; width: 100%; background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px); padding: 15px 5%; display: flex;
            align-items: center; justify-content: space-between; z-index: 1000; border-bottom: 1px solid var(--glass);
        }
        .nav-links { flex: 1; display: flex; gap: 20px; text-transform: uppercase; font-size: 0.8rem; font-weight: bold; }
        .nav-links.right { justify-content: flex-end; }
        nav a { color: white; text-decoration: none; transition: 0.3s; letter-spacing: 1px; }
        nav a:hover { color: var(--accent); }

        .search-container { flex: 2; display: flex; justify-content: center; }
        #searchInput {
            width: 100%; max-width: 400px; padding: 10px 20px; border-radius: 20px;
            border: 1px solid var(--glass); background: rgba(255,255,255,0.05); color: white; text-align: center; outline: none;
        }

        /* --- SEÇÃO 2: CARROSSEL DE ESCOLHA --- */
        .hero-carousel {
            padding: 120px 5% 40px; text-align: center;
            background: radial-gradient(circle at 50% 30%, rgba(0,212,255,0.1), transparent 60%);
        }
        .carousel-track {
            display: flex; gap: 20px; overflow-x: auto; padding: 20px;
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
        }
        .moon-option {
            min-width: 150px; cursor: pointer; transition: 0.4s;
            opacity: 0.6; filter: grayscale(1);
        }
        .moon-option:hover, .moon-option.active { opacity: 1; filter: grayscale(0); transform: scale(1.1); }
        .moon-option img { width: 120px; height: 120px; border-radius: 50%; border: 2px solid transparent; }
        .moon-option.active img { border-color: var(--accent); box-shadow: 0 0 20px var(--accent); }
        .moon-option p { margin-top: 10px; font-size: 0.8rem; font-weight: bold; }

        /* --- SEÇÃO 3: INFORMAÇÕES DA LUA SELECIONADA --- */
        .display-area {
            max-width: 1100px; margin: 20px auto 80px; display: flex;
            align-items: center; gap: 50px; background: var(--glass);
            padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05);
        }
        .display-img img { width: 350px; filter: drop-shadow(0 0 40px rgba(255,255,255,0.2)); }
        .display-text { flex: 1; text-align: right; }
        .display-text h2 { color: var(--accent); font-size: 2.5rem; margin-bottom: 15px; }
        .display-text .why-box {
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px;
            border-right: 4px solid var(--accent); margin-top: 20px; font-size: 0.95rem;
        }

        footer { text-align: center; padding: 40px; border-top: 1px solid var(--glass); opacity: 0.6; }

        @media (max-width: 768px) {
            .display-area { flex-direction: column; text-align: center; }
            .display-text { text-align: center; }
            .display-img img { width: 250px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-links"><a href="#home">Home</a></div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Pesquisar por nome ou mês..." onkeyup="searchMoons()">
        </div>
        <div class="nav-links right"><a href="#luas">Luas</a></div>
    </nav>

    <header class="hero-carousel" id="home">
        <h2 style="margin-bottom: 30px; letter-spacing: 3px;">ESCOLHA UMA LUA PARA EXPLORAR</h2>
        <div class="carousel-track" id="moonTrack">
            </div>
    </header>

    <main class="container">
        <section class="display-area" id="displayArea">
            <div class="display-img">
                <img id="mainMoonImg" src="" alt="">
            </div>
            <div class="display-text" id="mainMoonContent">
                <h2 id="moonTitle">Carregando...</h2>
                <p id="moonDesc"></p>
                <div class="why-box" id="moonWhy"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Selene Interactive - Dados Astronômicos em Tempo Real</p>
    </footer>

    <script>
        const moonData = [
            {
                id: "wolf",
                title: "Wolf Moon (Janeiro)",
                date: "03 de Janeiro, 2026",
                desc: "A primeira Superlua do ano. Recebe este nome pois os lobos uivavam de fome nas noites frias de inverno perto dos assentamentos humanos.",
                why: "Por que acontece: Ocorre quando a Lua atinge o Perigeu (maior proximidade com a Terra) durante a fase cheia, resultando em um brilho 30% maior.",
                img: "https://images.unsplash.com/photo-1534141662524-78d103831897?auto=format&fit=crop&w=600&q=80"
            },
            {
                id: "blood",
                title: "Blood Moon (Março)",
                date: "03 de Março, 2026",
                desc: "Um Eclipse Lunar Total que transforma o satélite em uma esfera de cor ferrugem ou vermelho escuro.",
                why: "Por que acontece: A luz solar é refratada pela atmosfera da Terra, que filtra as cores frias e projeta o espectro vermelho sobre a Lua.",
                img: "https://images.unsplash.com/photo-1532693322450-2cb5c511067d?auto=format&fit=crop&w=600&q=80"
            },
            {
                id: "snow",
                title: "Snow Moon (Fevereiro)",
                date: "01 de Fevereiro, 2026",
                desc: "Conhecida pelas tribos americanas pelas tempestades de neve pesadas que dificultavam a caça neste período.",
                why: "Por que acontece: É a fase cheia que marca o pico do inverno no hemisfério norte.",
                img: "https://images.unsplash.com/photo-1504333638930-c8787321eee0?auto=format&fit=crop&w=600&q=80"
            },
            {
                id: "pink",
                title: "Pink Moon (Abril)",
                date: "02 de Abril, 2026",
                desc: "A Lua de Abril simboliza o renascimento e o desabrochar das flores Phlox subulata.",
                why: "Por que acontece: Alinhamento sazonal que marca o início oficial da primavera boreal.",
                img: "https://images.unsplash.com/photo-1515260268569-9271009adfdb?auto=format&fit=crop&w=600&q=80"
            },
            {
                id: "harvest",
                title: "Harvest Moon (Setembro)",
                date: "26 de Setembro, 2026",
                desc: "A Lua mais próxima do equinócio de outono, essencial para as colheitas antigas devido ao seu brilho prolongado.",
                why: "Por que acontece: O ângulo da órbita lunar faz com que ela nasça quase no mesmo horário por várias noites seguidas.",
                img: "https://images.unsplash.com/photo-1506318129727-63d056162b83?auto=format&fit=crop&w=600&q=80"
            }
        ];

        const track = document.getElementById('moonTrack');

        function initCarousel() {
            moonData.forEach((moon, index) => {
                const div = document.createElement('div');
                div.className = `moon-option ${index === 0 ? 'active' : ''}`;
                div.innerHTML = `<img src="${moon.img}"><p>${moon.title.split(' ')[0]}</p>`;
                div.onclick = () => updateDisplay(index);
                track.appendChild(div);
            });
            updateDisplay(0);
        }

        function updateDisplay(index) {
            const moon = moonData[index];
            document.getElementById('mainMoonImg').src = moon.img;
            document.getElementById('moonTitle').innerText = moon.title;
            document.getElementById('moonDesc').innerText = `${moon.date} - ${moon.desc}`;
            document.getElementById('moonWhy').innerText = moon.why;

            // Update active state
            const options = document.querySelectorAll('.moon-option');
            options.forEach((opt, i) => {
                opt.classList.toggle('active', i === index);
            });
        }

        function searchMoons() {
            let term = document.getElementById('searchInput').value.toLowerCase();
            const options = document.querySelectorAll('.moon-option');
            moonData.forEach((moon, i) => {
                const visible = moon.title.toLowerCase().includes(term) || moon.desc.toLowerCase().includes(term);
                options[i].style.display = visible ? "block" : "none";
            });
        }

        initCarousel();
    </script>
</body>
</html>
