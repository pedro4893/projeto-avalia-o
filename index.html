<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNA 2026 - Eventos Astronômicos</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #00d4ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #050505 url('https://www.transparenttextures.com/patterns/stardust.png') fixed;
            color: white;
            line-height: 1.6;
        }

        /* Menu com Barra de Pesquisa Integrada */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            padding: 10px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            border-bottom: 1px solid var(--glass);
        }

        .nav-links { display: flex; gap: 25px; }
        .nav-links a { 
            color: white; 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .search-nav { position: relative; }
        .search-nav input {
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--glass);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
            width: 200px;
            transition: width 0.4s;
        }
        .search-nav input:focus { width: 300px; border-color: var(--accent); }

        /* Hero Section */
        header {
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), #050505), 
                        url('https://images.unsplash.com/photo-1476136230993-9d2c444505bb?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            text-align: center;
        }

        /* Conteúdo */
        .container { max-width: 1200px; margin: 80px auto; padding: 20px; }

        .event-card {
            background: var(--glass);
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .event-card:hover { border-color: var(--accent); transform: scale(1.01); }

        .event-img { width: 350px; object-fit: cover; }

        .event-info { padding: 30px; }
        .event-info h2 { color: var(--accent); margin-bottom: 10px; }
        .date-tag { background: #222; padding: 4px 12px; border-radius: 5px; font-size: 0.8rem; }

        .explanation {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-style: italic;
            color: #aaa;
        }
