<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observatório Luna 2026</title>
    <style>
        :root {
            --accent: #00d4ff;
            --glass: rgba(255, 255, 255, 0.1);
            --bg: #020205;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg) url('https://www.transparenttextures.com/patterns/stardust.png') fixed; 
            color: white; 
            overflow-x: hidden;
        }

        /* --- SEÇÃO 1: MENU --- */
        nav {
            position: fixed; top: 0; width: 100%; background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px); padding: 15px 5%; display: flex;
            align-items: center; justify-content: space-between; z-index: 1000; border-bottom: 1px solid var(--glass);
        }
        .nav-links { flex: 1; display: flex; gap: 20px; text-transform: uppercase; font-size: 0.8rem; font-weight: bold; }
        .nav-links.right { justify-content: flex-end; }
        nav a { color: white; text-decoration: none; transition: 0.3s; letter-spacing: 1px; }
        nav a:hover { color: var(--accent); }

        .search-container { flex: 2; display: flex; justify-content: center; }
        #searchInput {
            width: 100%; max-width: 400px; padding: 10px 20px; border-radius: 20px;
            border: 1px solid var(--glass); background: rgba(255,255,255,0.05); color: white; text-align: center; outline: none;
        }

        /* --- SEÇÃO 2: DESTAQUE PRINCIPAL --- */
        .hero-section {
            padding: 140px 8% 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 70vh;
        }

        .main-moon-display { flex: 1; display: flex; justify-content: center; position: relative; }
        .main-moon-display img { 
            width: 400px; 
            filter: drop-shadow(0 0 50px rgba(255,255,255,0.2));
            transition: transform 0.5s ease;
        }

        .moon-details { 
            flex: 1; 
            max-width: 450px; 
            text-align: right; 
            background: var(--glass);
            padding: 30px;
            border-radius: 20px;
            border-right: 5px solid var(--accent);
        }
        .moon-details h2 { color: var(--accent); font-size: 2.5rem; margin-bottom: 15px; }
        .moon-details p { font-size: 1rem; color: #ccc; margin-bottom: 15px; }

        /* --- SEÇÃO 3: CARROSSEL COM SCROLLBAR --- */
        .carousel-wrapper {
            max-width: 1200px;
            margin: 40px auto 100px;
            padding: 0 20px;
        }
        
        .carousel-title { text-align: center; margin-bottom: 20px; font-size: 0.9rem; letter-spacing: 3px; color: var(--accent); }

        .moon-track {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 20px 0;
            scroll-behavior: smooth;
        }

        /* Barra de Rolagem Estilizada */
        .moon-track::-webkit-scrollbar { height: 8px; }
        .moon-track::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .moon-track::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .moon-card {
            min-width: 160px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 15px;
        }
        .moon-card:hover { background: var(--glass); transform: translateY(-5px); }
        .moon-card img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; }
        .moon-card h4 { font-size: 0.8rem; text-transform: uppercase; }

        footer { text-align: center; padding: 40px; border-top: 1px solid var(--glass); opacity: 0.5; }

        @media (max-width: 900px) {
            .hero-section { flex-direction: column; text-align: center; }
            .moon-details { text-align: center; border-right: none; border-bottom: 5px solid var(--accent); margin-top: 30px; }
            .main-moon-display img { width: 250px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-links"><a href="#">Home</a></div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Pesquisar evento..." onkeyup="filterMoons()">
        </div>
        <div class="nav-links right"><a href="#galeria">Luas</a></div>
    </nav>

    <section class="hero-section">
        <div class="main-moon-display">
            <img id="activeMoonImg" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/FullMoon2010.jpg/600px-FullMoon2010.jpg" alt="Lua Ativa">
        </div>
        <div class="moon-details">
            <h2 id="moonTitle">Lua Cheia</h2>
            <p id="moonDesc">Fase em que a Lua se encontra em oposição ao Sol em relação à Terra, refletindo a luz solar em toda a sua face visível.</p>
            <div style="font-size: 0.85rem; color: var(--accent);" id="moonTechnical">
                <strong>Por que acontece:</strong> Alinhamento orbital Sizígia (Sol-Terra-Lua).
            </div>
        </div>
    </section>

    <div class="carousel-wrapper" id="galeria">
        <h3 class="carousel-title">SELECIONE UM EVENTO LUNAR DE 2026</h3>
        <div class="moon-track" id="moonTrack">
            </div>
    </div>

    <footer>
        <p>&copy; 2026 Selene Digital | Dados: NASA Science</p>
    </footer>

    <script>
        const events = [
            {
                name: "Lua do Lobo",
                date: "03 de Janeiro",
                desc: "A primeira Superlua de 2026. Recebe este nome pelos lobos uivando nas noites frias de inverno.",
                why: "Acontece devido ao Perigeu lunar (maior proximidade com a Terra) coincidindo com a fase cheia.",
                img: "https://images.unsplash.com/photo-1534141662524-78d103831897?auto=format&fit=crop&w=300&q=80"
            },
            {
                name: "Lua de Sangue",
                date: "03 de Março",
                desc: "Um Eclipse Lunar Total que deixa a lua com tons de vermelho escuro e laranja.",
                why: "A luz solar é filtrada pela atmosfera da Terra, projetando apenas as ondas vermelhas na superfície lunar.",
                img: "https://images.unsplash.com/photo-1532693322450-2cb5c511067d?auto=format&fit=crop&w=300&q=80"
            },
            {
                name: "Lua de Neve",
                date: "01 de Fevereiro",
                desc: "Lua cheia de fevereiro, época das maiores nevascas no hemisfério norte.",
                why: "Fenômeno sazonal cultural baseado no calendário das tribos nativas americanas.",
                img: "https://images.unsplash.com/photo-1504333638930-c8787321eee0?auto=format&fit=crop&w=300&q=80"
            },
            {
                name: "Lua Rosa",
                date: "02 de Abril",
                desc: "Marca o início da primavera e o desabrochar das flores Phlox de cor rosada.",
                why: "É a lua cheia que determina a data da Páscoa cristã (primeiro domingo após sua ocorrência).",
                img: "https://images.unsplash.com/photo-1515260268569-9271009adfdb?auto=format&fit=crop&w=300&q=80"
            },
            {
                name: "Lua da Colheita",
                date: "26 de Setembro",
                desc: "A lua que nasce mais próxima do equinócio de outono, brilhando intensamente.",
                why: "O ângulo da órbita lunar permite que ela nasça quase no mesmo horário por várias noites seguidas.",
                img: "https://images.unsplash.com/photo-1506318129727-63d056162b83?auto=format&fit=crop&w=300&q=80"
            },
            {
                name: "Lua Fria",
                date: "23 de Dezembro",
                desc: "A última Superlua de 2026, ocorrendo no auge do inverno boreal.",
                why: "Ocorre durante o solstício, quando as noites são mais longas e a lua cruza o céu em uma trajetória alta.",
                img: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=300&q=80"
            }
        ];

        const track = document.getElementById('moonTrack');

        // Inicializa o carrossel
        events.forEach(event => {
            const card = document.createElement('div');
            card.className = 'moon-card';
            card.innerHTML = `
                <img src="${event.img}" alt="${event.name}">
                <h4>${event.name}</h4>
                <small style="color: #666">${event.date}</small>
            `;
            card.onclick = () => {
                document.getElementById('activeMoonImg').src = event.img;
                document.getElementById('moonTitle').innerText = event.name;
                document.getElementById('moonDesc').innerText = event.desc;
                document.getElementById('moonTechnical').innerHTML = `<strong>Por que acontece:</strong> ${event.why}`;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            track.appendChild(card);
        });

        // Filtro de Pesquisa
        function filterMoons() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.getElementsByClassName('moon-card');
            for (let i = 0; i < cards.length; i++) {
                const title = cards[i].getElementsByTagName('h4')[0].innerText.toLowerCase();
                cards[i].style.display = title.includes(input) ? "block" : "none";
            }
        }
    </script>
</body>
</html>
