<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Lunarium | Carrossel de Luas - Eventos Lunares 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b);
            color: #f0f2f8;
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            scroll-behavior: smooth;
            min-height: 100vh;
        }

        header {
            background: rgba(5, 8, 18, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 215, 150, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1rem 2rem;
        }

        .nav-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo i {
            color: #f5c542;
            font-size: 2rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: #eef2ff;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #ffd966;
            text-shadow: 0 0 5px rgba(255, 200, 80, 0.4);
        }

        /* Barra de pesquisa */
        .search-container {
            display: flex;
            align-items: center;
            background: rgba(20, 28, 45, 0.8);
            border-radius: 60px;
            padding: 0.4rem 0.8rem;
            border: 1px solid #ffd96655;
            transition: 0.2s;
        }
        .search-container:focus-within {
            border-color: #ffcd7e;
            box-shadow: 0 0 10px rgba(255, 205, 126, 0.3);
        }
        .search-container i {
            color: #ffcd7e;
            margin-right: 8px;
            font-size: 0.9rem;
        }
        #search-input {
            background: transparent;
            border: none;
            color: white;
            font-size: 0.9rem;
            padding: 0.4rem 0;
            outline: none;
            width: 180px;
        }
        #search-input::placeholder {
            color: #9aa3c2;
        }
        .search-clear {
            background: none;
            border: none;
            color: #9aa3c2;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0 4px;
            display: none;
        }
        .search-clear:hover {
            color: #ffcd7e;
        }

        main {
            max-width: 1300px;
            margin: 2rem auto;
            padding: 0 1.5rem 3rem;
        }

        .hero {
            background: linear-gradient(135deg, rgba(25, 35, 60, 0.7), rgba(10, 15, 30, 0.85));
            border-radius: 3rem;
            padding: 2.5rem 2rem;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(255, 200, 100, 0.25);
            backdrop-filter: blur(4px);
            text-align: center;
        }

        .hero h1 {
            font-size: 2.6rem;
            font-family: 'Playfair Display', serif;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffe6b3, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* ========== CARROSSEL ========== */
        .carrossel-section {
            margin-bottom: 3rem;
        }
        .carrossel-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            border-left: 5px solid #ffcd7e;
            padding-left: 1rem;
            font-family: 'Playfair Display', serif;
        }
        .carousel-container {
            position: relative;
            border-radius: 2rem;
            overflow: hidden;
            background: rgba(0,0,0,0.4);
        }
        .carousel-slides {
            display: flex;
            transition: transform 0.5s ease-in-out;
            border-radius: 1.5rem;
        }
        .carousel-slide {
            min-width: 100%;
            position: relative;
            border-radius: 1.5rem;
            overflow: hidden;
        }
        .carousel-img {
            width: 100%;
            height: 420px;
            background-size: cover;
            background-position: center 30%;
            position: relative;
        }
        .carousel-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, #03050be6, transparent);
            padding: 2rem 2rem 1.5rem;
            color: white;
        }
        .carousel-overlay h3 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .carousel-overlay .carousel-date {
            display: inline-block;
            background: #ffcd7e33;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            margin-bottom: 0.8rem;
        }
        .carousel-overlay p {
            max-width: 80%;
            font-size: 0.95rem;
            opacity: 0.9;
        }
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border: none;
            color: #ffd966;
            font-size: 2rem;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.2s;
            z-index: 10;
        }
        .carousel-btn:hover {
            background: #ffcd7e;
            color: #0a0f1e;
        }
        .btn-prev {
            left: 1rem;
        }
        .btn-next {
            right: 1rem;
        }
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 1rem;
            padding-bottom: 0.5rem;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #5a6e8a;
            cursor: pointer;
            transition: 0.2s;
        }
        .dot.active {
            background: #ffcd7e;
            width: 28px;
            border-radius: 10px;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 600;
            margin: 1.5rem 0 1.5rem 0;
            border-left: 5px solid #ffcd7e;
            padding-left: 1rem;
            font-family: 'Playfair Display', serif;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .result-count {
            font-size: 0.9rem;
            font-weight: normal;
            color: #ffdf9c;
            background: #1e2a3e;
            padding: 0.3rem 1rem;
            border-radius: 30px;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
            margin-top: 0.5rem;
        }

        .card {
            background: rgba(12, 18, 32, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.3s;
            border: 1px solid rgba(255, 220, 140, 0.25);
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.6);
            border-color: #ffcd7eaa;
        }

        .card-img {
            height: 200px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
        }

        .card-date {
            background: #000000bb;
            backdrop-filter: blur(8px);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            margin: 12px;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: #ffdf9c;
        }

        .card-content {
            padding: 1.4rem 1.5rem 1.8rem;
            flex: 1;
        }

        .card-title {
            font-size: 1.55rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            line-height: 1.3;
        }

        .card-desc {
            color: #cbd5f0;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        .extra-detail {
            font-size: 0.85rem;
            color: #ffdd99;
            background: rgba(0,0,0,0.35);
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            margin-top: 0.5rem;
        }

        /* Modal de detalhes */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .modal-content {
            background: linear-gradient(145deg, #101a2e, #080c1a);
            border-radius: 2rem;
            max-width: 600px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid #ffcd7e;
            box-shadow: 0 30px 40px rgba(0,0,0,0.5);
            animation: fadeInUp 0.3s ease;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 1.8rem;
            border-bottom: 1px solid #ffcd7e55;
        }
        .modal-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
        }
        .close-modal {
            background: none;
            border: none;
            color: #ffcd7e;
            font-size: 2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-modal:hover {
            color: white;
            transform: scale(1.1);
        }
        .modal-body {
            padding: 1.5rem 1.8rem 2rem;
        }
        .modal-img {
            width: 100%;
            height: 220px;
            background-size: cover;
            background-position: center;
            border-radius: 1.2rem;
            margin-bottom: 1.2rem;
        }
        .modal-date {
            display: inline-block;
            background: #ffcd7e22;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        .modal-desc {
            margin: 1rem 0;
            line-height: 1.6;
        }
        .modal-extra {
            background: #1e2a44;
            padding: 0.8rem;
            border-radius: 1rem;
            margin-top: 1rem;
            font-size: 0.9rem;
            border-left: 3px solid #ffcd7e;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }

        footer {
            background: #03060ecc;
            backdrop-filter: blur(8px);
            border-top: 1px solid #ffd96633;
            padding: 2rem 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: #9aa9c7;
            margin-top: 3rem;
        }

        @media (max-width: 750px) {
            .nav-container {
                flex-direction: column;
            }
            .search-container {
                width: 100%;
                justify-content: space-between;
            }
            #search-input {
                width: 100%;
            }
            .hero h1 {
                font-size: 1.9rem;
            }
            .carousel-img {
                height: 320px;
            }
            .carousel-overlay h3 {
                font-size: 1.4rem;
            }
            .carousel-overlay p {
                max-width: 100%;
                font-size: 0.8rem;
            }
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            background: #0f1422;
            border-radius: 2rem;
            color: #ccc;
        }
        .badge-click {
            font-size: 0.7rem;
            margin-top: 0.6rem;
            color: #ffcd7eaa;
        }
        .pill {
            background: #ffcd7e22;
            padding: 0.3rem 1rem;
            border-radius: 40px;
        }
    </style>
</head>
<body>

        <ul class="nav-links">

<main id="main-content">

</main>

<footer>

</footer>

<!-- Modal -->
<div id="detail-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-title">Detalhes</h2>
            <button class="close-modal">&times;</button>
        </div>
        <div class="modal-body">
            <div id="modal-img" class="modal-img"></div>
            <div><span id="modal-date" class="modal-date"></span></div>
            <div id="modal-desc" class="modal-desc"></div>
            <div id="modal-extra" class="modal-extra"></div>
            <div id="modal-scientific" style="margin-top: 1rem; font-size: 0.85rem; color: #b9c3e6;"><i class="fas fa-globe"></i> Informações detalhadas de pesquisa astronômica</div>
        </div>
    </div>
</div>

<script>
    // ======================== BASE DE DADOS DOS EVENTOS ========================
    const eventos = [
        {
            id: 1,
            titulo: "🌑 Superlua Nova",
            data: "3 de Janeiro",
            descricao: "Superlua Nova no perigeu, céu escuro perfeito para observar estrelas.",
            descricaoCompleta: "Durante a Superlua Nova, a Lua está entre a Terra e o Sol, mas por estar mais próxima, o perigeu intensifica as marés. É um excelente período para astrofotografia de céu profundo devido à ausência de luz lunar. Fenômeno ocorre apenas algumas vezes ao ano.",
            imagem: "https://images.pexels.com/photos/47367/full-moon-moonlight-nature-47367.jpeg?auto=compress&cs=tinysrgb&w=800&h=500&fit=crop",

        },
        {

            descricao: "A Lua adquire coloração avermelhada devido à refração da luz solar na atmosfera.",
            descricaoCompleta: "Durante a totalidade, a Lua adquire tons que variam do cobre ao vermelho sangue. A atmosfera terrestre filtra a luz azul e espalha a vermelha. Esse eclipse total tem duração aproximada de 1h18. Fenômeno seguro de observar a olho nu.",
            imagem: "https://images.pexels.com/photos/17431603/pexels-photo-17431603/free-photo-of-lua-de-sangue.jpeg?auto=compress&cs=tinysrgb&w=800&h=500&fit=crop",

        },
        {
            id: 3,
            titulo: "🔭 Aproximação: Lua + Marte + Mercúrio",
            data: "18 de Março",
            descricao: "Conjunção tripla: Lua, Marte e Mercúrio alinhados no céu ocidental.",
            descricaoCompleta: "Marte apresenta coloração alaranjada e Mercúrio brilha próximo ao horizonte. Aproximação aparente inferior a 3 graus. Fenômeno ideal para observadores iniciantes, visível em céu limpo ao entardecer.",
            imagem: "https://images.pexels.com/photos/2680270/pexels-photo-2680270.jpeg?auto=compress&cs=tinysrgb&w=800&h=500&fit=crop",
            extra: "🔭 Separação aparente < 3° | Melhor horário: 19h-20h.",
            categoria: "Conjunção, Marte, Mercúrio"
        },
        {
            id: 4,
            titulo: "💙 Lua Azul (segunda lua cheia)",
            data: "31 de Maio",
            descricao: "Segunda Lua Cheia no mesmo mês, fenômeno raro a cada 2,5 anos.",
            descricaoCompleta: "O termo 'Lua Azul' tem origem em expressões antigas. Essa Lua Cheia extra ocorre devido à diferença entre o ciclo lunar e o calendário. É uma ótima oportunidade para observação noturna e rituais culturais.",

            extra: "💙 Fenômeno calendárico | Ocorre aproximadamente a cada 2,7 anos.",

        },
        {
            id: 5,
            titulo: "🌟 Lua esconde Vênus (ocultação diurna)",
            data: "17 de Junho",
            descricao: "Ocultação de Vênus pela Lua durante o dia. Desafio para telescópios.",
            descricaoCompleta: "Vênus, o planeta mais brilhante, desaparece atrás do disco lunar e reaparece. O evento é diurno, exigindo instrumentos ópticos com proteção adequada. Raro e fascinante para astrofotógrafos.",

            categoria: "Ocultação, Vênus"
        },
        {
            id: 6,
            titulo: "🌗 Eclipse Lunar Parcial",
            data: "27-28 de Agosto",
            descricao: "Eclipse parcial com 'mordida' escura na superfície lunar.",
            descricaoCompleta: "Cobertura umbral de aproximadamente 63%. O fenômeno é visível em toda América do Sul, partes da Europa e África. O ápice ocorre na madrugada do dia 28.",

            extra: "🌗 Máximo do eclipse às 04h13 | Cobertura umbral: 63%.",
            categoria: "Eclipse Parcial"
        },
        {
            id: 7,
            titulo: "🪐 Lua esconde Júpiter",
            data: "6 de Outubro",
            descricao: "Júpiter desaparece atrás da Lua em ocultação espetacular.",
            descricaoCompleta: "Ocultação de Júpiter visível em várias regiões do Brasil. Recomenda-se uso de telescópio para observar o momento em que o planeta desaparece e reaparece no limbo lunar. Júpiter estará em magnitude -2.8.",
            imagem: "https://images.pexels.com/photos/1308940/pexels-photo-1308940.jpeg?auto=compress&cs=tinysrgb&w=800&h=500&fit=crop",
            extra: "🪐 Júpiter magnitude -2.8 | Visível no Brasil e América do Sul.",
            categoria: "Ocultação, Júpiter"
        },
        {
            id: 8,
            titulo: "🎄 Superlua de Natal",
            data: "24 de Dezembro",
            descricao: "Superlua brilhante na véspera de Natal, até 30% mais brilhante.",
            descricaoCompleta: "Superlua de Natal é um dos eventos mais aguardados. A combinação da órbita elíptica da Lua com a fase cheia proporciona visibilidade impressionante. Perfeito para fotografias junto a paisagens urbanas.",
            imagem: "https://images.pexels.com/photos/355241/pexels-photo-355241.jpeg?auto=compress&cs=tinysrgb&w=800&h=500&fit=crop",
            extra: "🎄 Distância: 361.000 km | Nascimento às 18h12.",
            categoria: "Superlua, Natal"
        }
    ];

    let currentView = 'home';
    let currentSearchTerm = '';
    let filteredEventos = [...eventos];
    let carouselIndex = 0;
    let carouselInterval = null;

    const dynamicView = document.getElementById('dynamic-view');
    const searchInput = document.getElementById('search-input');
    const searchClear = document.getElementById('search-clear');
    const modal = document.getElementById('detail-modal');
    const closeModalBtn = document.querySelector('.close-modal');

    function filterEventsBySearch(term) {
        if (!term.trim()) {
            filteredEventos = [...eventos];
            return;
        }
        const lowerTerm = term.toLowerCase();
        filteredEventos = eventos.filter(ev => 
            ev.titulo.toLowerCase().includes(lowerTerm) ||
            ev.descricao.toLowerCase().includes(lowerTerm) ||
            ev.descricaoCompleta.toLowerCase().includes(lowerTerm) ||
            ev.categoria.toLowerCase().includes(lowerTerm) ||
            ev.data.toLowerCase().includes(lowerTerm) ||
            ev.extra.toLowerCase().includes(lowerTerm)
        );
    }

    function refreshDisplay() {
        if (currentView === 'home') {
            renderHomeWithCarousel();
        } else {
            renderEventosView();
        }
    }

    // Carrossel: iniciar e parar
    function startCarousel() {
        if (carouselInterval) clearInterval(carouselInterval);
        carouselInterval = setInterval(() => {
            if (currentView === 'home') {
                nextSlide();
            }
        }, 5000);
    }
    function stopCarousel() {
        if (carouselInterval) {
            clearInterval(carouselInterval);
            carouselInterval = null;
        }
    }

    function nextSlide() {
        if (filteredEventos.length === 0) return;
        carouselIndex = (carouselIndex + 1) % filteredEventos.length;
        updateCarouselDisplay();
    }

    function prevSlide() {
        if (filteredEventos.length === 0) return;
        carouselIndex = (carouselIndex - 1 + filteredEventos.length) % filteredEventos.length;
        updateCarouselDisplay();
    }

    function goToSlide(index) {
        if (index >= 0 && index < filteredEventos.length) {
            carouselIndex = index;
            updateCarouselDisplay();
        }
    }

    function updateCarouselDisplay() {
        if (filteredEventos.length === 0) return;
        const slidesContainer = document.querySelector('.carousel-slides');
        if (!slidesContainer) return;
        slidesContainer.style.transform = `translateX(-${carouselIndex * 100}%)`;
        // atualizar dots
        const dots = document.querySelectorAll('.dot');
        dots.forEach((dot, i) => {
            if (i === carouselIndex) dot.classList.add('active');
            else dot.classList.remove('active');
        });
    }

                </div>

                ${currentSearchTerm ? `<div class="pill" style="display:inline-block; margin-top:1rem;"><i class="fas fa-filter"></i> Filtro: "${escapeHtml(currentSearchTerm)}" · ${eventosCarrossel.length} resultados</div>` : '<div class="intro-text">🔭 Use a barra de pesquisa e navegue pelo carrossel interativo.</div>'}

                <span class="result-count">${eventosCarrossel.length} evento(s)</span>

            ${eventosCarrossel.length > 6 ? `<div style="text-align: center; margin: 2rem 0 0;"><a id="view-all-link" style="background:#ffcd7e22; padding:0.7rem 2rem; border-radius:40px; cursor:pointer; display:inline-block;"><i class="fas fa-arrow-right"></i> Ver todos os ${eventosCarrossel.length} eventos →</a></div>` : ''}

        // Atribuir eventos do carrossel
        const prevBtn = document.getElementById('carousel-prev');
        const nextBtn = document.getElementById('carousel-next');
        if (prevBtn) prevBtn.addEventListener('click', () => { prevSlide(); restartAutoSlide(); });
        if (nextBtn) nextBtn.addEventListener('click', () => { nextSlide(); restartAutoSlide(); });
        
        const dots = document.querySelectorAll('.dot');
        dots.forEach(dot => {
            dot.addEventListener('click', (e) => {
                const idx = parseInt(dot.getAttribute('data-index'));
                goToSlide(idx);
                restartAutoSlide();
            });

        stopCarousel();
